<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html"><img src="img/Logo-Vareza.png" alt="Vareza Forum" /> Vareza Forum</a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Threads</a>
    <span id="nav-auth"></span>
  </div>
</nav>

<div class="wide-container">
  <div class="hero">
    <h1>The <span>Discussion</span> Starts Here</h1>
    <p>Browse threads, share ideas, and join the conversation.</p>
  </div>

  <div class="layout">
    <!-- MAIN -->
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
        <div style="display:flex; gap:0.5rem;">
          <input id="search-input" type="text" placeholder="Search threads…" style="width:220px; padding:0.5rem 0.8rem; font-size:0.85rem;" />
          <button class="btn btn-ghost btn-sm" onclick="loadThreads()">Search</button>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:center;">
          <select id="topic-batch-size" onchange="changeTopicBatchSize(this.value)" style="width:auto;">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="all">All</option>
          </select>
          <a href="pages/new-thread.html" class="btn btn-primary btn-sm" id="new-thread-btn" style="display:none;">+ New Thread</a>
        </div>
      </div>

      <div id="thread-list"><div class="loading">Loading threads…</div></div>
      <div id="topic-count-info" style="margin-top:0.6rem; font-size:0.82rem; color:var(--text-muted);"></div>

      <div style="display:flex; gap:0.5rem; justify-content:center; margin-top:2rem;" id="pagination"></div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <div class="card" style="margin-bottom:1rem;">
        <div style="font-size:0.75rem; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:0.75rem;">Categories</div>
        <div id="category-list"><div class="loading" style="padding:1rem 0;">…</div></div>
      </div>
      <div class="card">
        <div style="font-size:0.75rem; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:0.75rem;">Tags</div>
        <div id="tag-list"><div class="loading" style="padding:1rem 0;">…</div></div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  let currentPage = 1;
  let activeCategory = '';
  let activeTag = '';
  let topicBatchSize = '10';
  const editedLabel = (createdAt, updatedAt) =>
    new Date(updatedAt).getTime() > new Date(createdAt).getTime() ? ' (edited)' : '';

  function renderNav() {
    const user = auth.getUser();
    const navAuth = document.getElementById('nav-auth');
    const newBtn = document.getElementById('new-thread-btn');
    if (user) {
      navAuth.innerHTML = `${user.role === 'admin' ? '<a href="pages/admin-dashboard.html">Admin Dashboard</a>' : ''} <span id="account-menu-slot"></span>`;
      auth.renderAccountMenu('account-menu-slot', { basePath: '' });
      newBtn.style.display = 'inline-flex';
    } else {
      auth.renderAccountMenu('nav-auth', { basePath: '' });
    }
  }

  async function loadThreads(page = 1) {
    currentPage = page;
    const search = document.getElementById('search-input').value;
    let url = `/threads?page=${page}&limit=${encodeURIComponent(topicBatchSize)}`;
    if (activeCategory) url += `&category=${activeCategory}`;
    if (activeTag) url += `&tag=${activeTag}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;

    const list = document.getElementById('thread-list');
    list.innerHTML = '<div class="loading">Loading…</div>';
    try {
      const data = await api.get(url, auth.isLoggedIn());
      const infoEl = document.getElementById('topic-count-info');
      const shown = data.threads.length;
      const totalLabel = topicBatchSize === 'all'
        ? `${shown}`
        : `${shown}${shown === Number(topicBatchSize) ? '+' : ''}`;
      infoEl.textContent = `Showing ${shown} of ${totalLabel} topics`;
      if (!data.threads.length) { list.innerHTML = '<div class="empty">No threads found.</div>'; return; }
      list.innerHTML = data.threads.map(t => `
        <div class="thread-item ${t.is_pinned ? 'pinned' : ''}">
          <div>
            <div class="thread-flags">
              ${t.is_pinned ? '<span class="flag flag-pinned">📌 Pinned</span>' : ''}
              ${t.is_locked ? '<span class="flag flag-locked">🔒 Locked</span>' : ''}
              ${t.state === 'archived' ? '<span class="flag flag-archived">Archived</span>' : ''}
            </div>
            <div class="thread-title"><a href="pages/thread.html?slug=${t.slug}">${t.title}</a></div>
            ${t.image_url ? `<div style="margin:0.6rem 0 0.4rem;"><img src="${t.image_url}" alt="Thread media" style="max-width:220px; width:100%; border-radius:10px; border:1px solid var(--line);" /></div>` : ''}
            <div class="thread-meta">
              <span>by <strong>${t.author_name}</strong></span>
              <span class="category-pill">${t.category_name}</span>
              <span>${new Date(t.created_at).toLocaleDateString()}${editedLabel(t.created_at, t.updated_at)}</span>
              <span>💬 ${t.comment_count}</span>
              <span>👁 ${t.view_count}</span>
            </div>
          </div>
          <div class="thread-stats">
            <div class="vote-bar" style="justify-content:flex-end;">
              <button class="vote-btn btn-sm" onclick="voteThread(${t.id}, 1)">▲</button>
              <span class="vote-score">${t.vote_score > 0 ? '+' : ''}${t.vote_score}</span>
              <button class="vote-btn btn-sm" onclick="voteThread(${t.id}, -1)">▼</button>
            </div>
            <span style="display:block; margin-top:0.25rem;">votes</span>
          </div>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  async function loadCategories() {
    try {
      const data = await api.get('/categories');
      const el = document.getElementById('category-list');
      el.innerHTML = `<div style="margin-bottom:0.4rem;"><a href="#" onclick="filterCategory('')" style="font-size:0.85rem; color:var(--text-dim);">All categories</a></div>` +
        data.categories.map(c => `
          <div style="margin-bottom:0.3rem; display:flex; justify-content:space-between; align-items:center;">
            <a href="#" onclick="filterCategory('${c.slug}')" style="font-size:0.85rem; color:var(--text-dim);">${c.name}</a>
            <span style="font-size:0.72rem; color:var(--text-muted); font-family:var(--font-mono);">${c.thread_count}</span>
          </div>`).join('');
    } catch {}
  }

  async function loadTags() {
    try {
      const data = await api.get('/tags');
      document.getElementById('tag-list').innerHTML =
        data.tags.slice(0, 20).map(t => `<a href="#" onclick="filterTag('${t.slug}')" class="tag">${t.name} (${t.thread_count})</a>`).join(' ');
    } catch {}
  }

  function filterCategory(slug) {
    activeCategory = slug; activeTag = '';
    loadThreads(1);
  }
  function filterTag(slug) {
    activeTag = slug; activeCategory = '';
    loadThreads(1);
  }

  function changeTopicBatchSize(value) {
    topicBatchSize = value;
    currentPage = 1;
    loadThreads(1);
  }

  async function voteThread(threadId, value) {
    if (!auth.isLoggedIn()) {
      window.location.href = 'pages/login.html';
      return;
    }
    try {
      await api.post('/vote', { target_type: 'thread', target_id: threadId, value }, true);
      await loadThreads(currentPage);
    } catch (e) {
      alert(e.message);
    }
  }

  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadThreads(1); });
  document.getElementById('topic-batch-size').value = topicBatchSize;

  renderNav();
  loadThreads();
  loadCategories();
  loadTags();
</script>
</body>
</html>
