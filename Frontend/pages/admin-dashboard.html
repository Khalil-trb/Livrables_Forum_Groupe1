<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau Admin - Forum</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav>
  <a class="nav-brand" href="../index.html"><img src="../img/Logo-Vareza.png" alt="Vareza Forum" /> Vareza Forum</a>
  <div class="nav-links" id="nav-links">
    <a href="../index.html">&larr; Sujets</a>
    <span id="nav-auth"></span>
  </div>
</nav>

<div class="wide-container">
  <div class="hero">
    <h1>Tableau <span>d'administration</span></h1>
    <p>Gérez les sujets, messages et comptes utilisateurs.</p>
  </div>

  <div id="alert"></div>

  <div class="admin-filter-panel" aria-label="Filtrer le tableau d'administration">
    <button type="button" class="admin-filter-btn active" data-admin-filter="users">Utilisateurs</button>
    <button type="button" class="admin-filter-btn" data-admin-filter="reports">Signalements</button>
    <button type="button" class="admin-filter-btn" data-admin-filter="comments">Commentaires</button>
    <button type="button" class="admin-filter-btn" data-admin-filter="topics">Posts</button>
  </div>

  <div class="card admin-section" data-admin-section="topics" style="margin-bottom:1rem;">
    <h3 style="margin-bottom:0.8rem;">Sujets</h3>
    <div id="topics-list"><div class="loading">Chargement des sujets...</div></div>
  </div>

  <div class="card admin-section" data-admin-section="comments" style="margin-bottom:1rem;">
    <h3 style="margin-bottom:0.8rem;">Messages</h3>
    <div id="comments-list"><div class="loading">Chargement des messages...</div></div>
  </div>

  <div class="card admin-section" data-admin-section="reports" style="margin-bottom:1rem;">
    <div style="display:flex; justify-content:space-between; gap:1rem; align-items:center; flex-wrap:wrap; margin-bottom:0.8rem;">
      <h3>Signalements</h3>
      <select id="report-status-filter" onchange="loadReports()" style="width:auto;">
        <option value="open">Ouverts</option>
        <option value="reviewed">Traites</option>
        <option value="dismissed">Rejetes</option>
        <option value="all">Tous</option>
      </select>
    </div>
    <div id="reports-list"><div class="loading">Chargement des signalements...</div></div>
  </div>

  <div class="card admin-section" data-admin-section="users">
    <h3 style="margin-bottom:0.8rem;">Utilisateurs</h3>
    <div id="users-list"><div class="loading">Chargement des utilisateurs...</div></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  function renderNav() {
    auth.renderAccountMenu('nav-auth', { basePath: '../' });
  }

  function ensureAdmin() {
    const user = auth.getUser();
    if (!auth.isLoggedIn() || !user || user.role !== 'admin') {
      window.location.href = '../index.html';
      return false;
    }
    return true;
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function profileHref(userId) {
    return `profile.html?id=${encodeURIComponent(userId)}`;
  }

  function threadState(thread) {
    if (thread.is_deleted) return 'archived';
    if (thread.is_locked) return 'closed';
    return 'open';
  }

  function reportTypeLabel(type) {
    if (type === 'thread') return 'Sujet';
    if (type === 'comment') return 'Commentaire';
    if (type === 'user') return 'Utilisateur';
    return type;
  }

  function reportTargetLabel(report) {
    if (report.target_type === 'thread') return report.target_thread_title || `Sujet #${report.target_id}`;
    if (report.target_type === 'comment') return (report.target_comment_content || `Commentaire #${report.target_id}`).slice(0, 120);
    if (report.target_type === 'user') return report.target_user_name || `Utilisateur #${report.target_id}`;
    return `#${report.target_id}`;
  }

  function setAlert(message, isError = false) {
    document.getElementById('alert').innerHTML = message
      ? `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${escapeHtml(message)}</div>`
      : '';
  }

  function setActiveAdminSection(section) {
    document.querySelectorAll('[data-admin-section]').forEach((panel) => {
      panel.hidden = panel.getAttribute('data-admin-section') !== section;
    });
    document.querySelectorAll('[data-admin-filter]').forEach((button) => {
      const isActive = button.getAttribute('data-admin-filter') === section;
      button.classList.toggle('active', isActive);
      button.setAttribute('aria-pressed', String(isActive));
    });
  }

  function setupAdminFilters() {
    document.querySelectorAll('[data-admin-filter]').forEach((button) => {
      button.addEventListener('click', () => {
        setActiveAdminSection(button.getAttribute('data-admin-filter'));
      });
    });
    setActiveAdminSection('users');
  }

  async function loadTopics() {
    const data = await api.get('/admin/threads?limit=100', true);
    const list = document.getElementById('topics-list');
    if (!data.threads.length) {
      list.innerHTML = '<div class="empty">Aucun sujet trouvé.</div>';
      return;
    }
    list.innerHTML = data.threads.map(t => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div class="thread-title">${escapeHtml(t.title)}</div>
          <div class="thread-meta">
            <span>#${t.id}</span>
            <span>par <strong>${escapeHtml(t.author_name)}</strong></span>
            <span>état : ${threadState(t)}</span>
          </div>
        </div>
        <div style="display:flex; gap:0.4rem; align-items:center;">
          <button class="btn btn-danger btn-sm" onclick="deleteTopic(${t.id})">Supprimer</button>
        </div>
      </div>
    `).join('');
  }

  async function loadComments() {
    const data = await api.get('/admin/comments?limit=100', true);
    const list = document.getElementById('comments-list');
    if (!data.comments.length) {
      list.innerHTML = '<div class="empty">Aucun message trouvé.</div>';
      return;
    }
    list.innerHTML = data.comments.map(c => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div style="font-size:0.9rem; color:var(--text-dim);">${escapeHtml(c.content).slice(0, 180)}</div>
          <div class="thread-meta">
            <span>#${c.id}</span>
            <span>par <strong>${escapeHtml(c.author_name)}</strong></span>
            <span>sujet : ${escapeHtml(c.thread_title)}</span>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteMessage(${c.id})">Supprimer le message</button>
      </div>
    `).join('');
  }

  async function loadUsers() {
    const data = await api.get('/admin/users?limit=100', true);
    const list = document.getElementById('users-list');
    if (!data.users.length) {
      list.innerHTML = '<div class="empty">Aucun utilisateur trouvé.</div>';
      return;
    }
    list.innerHTML = data.users.map(u => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div class="thread-title"><a class="user-link" href="${profileHref(u.id)}">${escapeHtml(u.username)}</a></div>
          <div class="thread-meta">
            <span>#${u.id}</span>
            <span>${escapeHtml(u.email)}</span>
            <span>rôle : ${escapeHtml(u.role)}</span>
            <span>${u.is_banned ? 'banni' : 'actif'}</span>
          </div>
        </div>
        ${u.role === 'admin'
          ? '<span style="font-size:0.8rem; color:var(--text-muted);">Compte admin</span>'
          : `<button class="btn ${u.is_banned ? 'btn-ghost' : 'btn-danger'} btn-sm" onclick="toggleBan(${u.id}, ${u.is_banned ? 'false' : 'true'})">${u.is_banned ? 'Débannir' : 'Bannir'}</button>`
        }
      </div>
    `).join('');
  }

  async function loadReports() {
    const status = document.getElementById('report-status-filter')?.value || 'open';
    const data = await api.get(`/admin/reports?status=${encodeURIComponent(status)}`, true);
    const list = document.getElementById('reports-list');
    if (!data.reports.length) {
      list.innerHTML = '<div class="empty">Aucun signalement trouve.</div>';
      return;
    }
    list.innerHTML = data.reports.map(r => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div class="thread-title">${reportTypeLabel(r.target_type)} : ${escapeHtml(reportTargetLabel(r))}</div>
          <div style="font-size:0.9rem; color:var(--text-dim); margin:0.35rem 0;">${escapeHtml(r.reason)}</div>
          <div class="thread-meta">
            <span>#${r.id}</span>
            <span>par <strong>${escapeHtml(r.reporter_name)}</strong></span>
            <span>statut : ${escapeHtml(r.status)}</span>
            <span>${new Date(r.created_at).toLocaleString()}</span>
          </div>
        </div>
        <div style="display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
          ${r.status === 'open'
            ? `<button class="btn btn-primary btn-sm" onclick="updateReport(${r.id}, 'reviewed')">Marquer traite</button>
               <button class="btn btn-ghost btn-sm" onclick="updateReport(${r.id}, 'dismissed')">Rejeter</button>
               ${reportTargetAction(r)}`
            : `<span class="tag">${escapeHtml(r.status)}</span>`
          }
        </div>
      </div>
    `).join('');
  }

  function reportTargetAction(report) {
    if (report.target_type === 'thread') {
      return `<button class="btn btn-danger btn-sm" onclick="deleteReportedTarget(${report.id}, 'thread', ${report.target_id})">Supprimer le sujet</button>`;
    }
    if (report.target_type === 'comment') {
      return `<button class="btn btn-danger btn-sm" onclick="deleteReportedTarget(${report.id}, 'comment', ${report.target_id})">Supprimer le message</button>`;
    }
    if (report.target_type === 'user') {
      return `<button class="btn btn-danger btn-sm" onclick="banReportedUser(${report.id}, ${report.target_id})">Bannir</button>`;
    }
    return '';
  }

  async function deleteTopic(threadId) {
    if (!confirm('Supprimer définitivement ce sujet ?')) return;
    try {
      await api.delete(`/threads/${threadId}`, true);
      setAlert('Sujet supprimé.');
      await Promise.all([loadTopics(), loadReports()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function deleteMessage(commentId) {
    if (!confirm('Supprimer ce message ?')) return;
    try {
      await api.delete(`/comments/${commentId}`, true);
      setAlert('Message supprimé.');
      await Promise.all([loadComments(), loadReports()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function toggleBan(userId, ban) {
    if (!confirm(ban ? 'Bannir cet utilisateur ?' : 'Débannir cet utilisateur ?')) return;
    try {
      await api.patch(`/admin/users/${userId}/ban`, { ban }, true);
      setAlert(ban ? 'Utilisateur banni.' : 'Utilisateur débanni.');
      await loadUsers();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function updateReport(reportId, status) {
    try {
      await api.patch(`/admin/reports/${reportId}`, { status }, true);
      setAlert(status === 'reviewed' ? 'Signalement marque comme traite.' : 'Signalement rejete.');
      await loadReports();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function deleteReportedTarget(reportId, targetType, targetId) {
    const label = targetType === 'thread' ? 'ce sujet' : 'ce message';
    if (!confirm(`Supprimer ${label} et marquer le signalement comme traite ?`)) return;
    try {
      const endpoint = targetType === 'thread' ? `/threads/${targetId}` : `/comments/${targetId}`;
      await api.delete(endpoint, true);
      await api.patch(`/admin/reports/${reportId}`, { status: 'reviewed' }, true);
      setAlert(targetType === 'thread' ? 'Sujet supprime.' : 'Message supprime.');
      await Promise.all([loadTopics(), loadComments(), loadReports()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function banReportedUser(reportId, userId) {
    if (!confirm('Bannir cet utilisateur et marquer le signalement comme traite ?')) return;
    try {
      await api.patch(`/admin/users/${userId}/ban`, { ban: true }, true);
      await api.patch(`/admin/reports/${reportId}`, { status: 'reviewed' }, true);
      setAlert('Utilisateur banni.');
      await Promise.all([loadUsers(), loadTopics(), loadComments(), loadReports()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function init() {
    if (!ensureAdmin()) return;
    renderNav();
    setupAdminFilters();
    try {
      await Promise.all([loadTopics(), loadComments(), loadUsers(), loadReports()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  init();
</script>
</body>
</html>
