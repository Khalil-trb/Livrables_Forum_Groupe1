<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Forum</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav>
  <a class="nav-brand" href="../index.html"><img src="../img/Logo-Vareza.png" alt="Vareza Forum" /> Vareza Forum</a>
  <div class="nav-links" id="nav-links">
    <a href="../index.html">&larr; Threads</a>
    <span id="nav-auth"></span>
  </div>
</nav>

<div class="wide-container">
  <div class="hero">
    <h1>Administration <span>Dashboard</span></h1>
    <p>Manage topics, messages and user accounts.</p>
  </div>

  <div id="alert"></div>

  <div class="card" style="margin-bottom:1rem;">
    <h3 style="margin-bottom:0.8rem;">Topics</h3>
    <div id="topics-list"><div class="loading">Loading topics...</div></div>
  </div>

  <div class="card" style="margin-bottom:1rem;">
    <h3 style="margin-bottom:0.8rem;">Messages</h3>
    <div id="comments-list"><div class="loading">Loading messages...</div></div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:0.8rem;">Users</h3>
    <div id="users-list"><div class="loading">Loading users...</div></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  function renderNav() {
    auth.renderAccountMenu('nav-auth', { basePath: '../' });
  }

  function ensureAdmin() {
    const user = auth.getUser();
    if (!auth.isLoggedIn() || !user || user.role !== 'admin') {
      window.location.href = '../index.html';
      return false;
    }
    return true;
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function threadState(thread) {
    if (thread.is_deleted) return 'archived';
    if (thread.is_locked) return 'closed';
    return 'open';
  }

  function setAlert(message, isError = false) {
    document.getElementById('alert').innerHTML = message
      ? `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${escapeHtml(message)}</div>`
      : '';
  }

  async function loadTopics() {
    const data = await api.get('/admin/threads?limit=100', true);
    const list = document.getElementById('topics-list');
    if (!data.threads.length) {
      list.innerHTML = '<div class="empty">No topics found.</div>';
      return;
    }
    list.innerHTML = data.threads.map(t => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div class="thread-title">${escapeHtml(t.title)}</div>
          <div class="thread-meta">
            <span>#${t.id}</span>
            <span>by <strong>${escapeHtml(t.author_name)}</strong></span>
            <span>state: ${threadState(t)}</span>
          </div>
        </div>
        <div style="display:flex; gap:0.4rem; align-items:center;">
          <select id="state-${t.id}" style="width:auto;">
            <option value="open" ${threadState(t) === 'open' ? 'selected' : ''}>open</option>
            <option value="closed" ${threadState(t) === 'closed' ? 'selected' : ''}>closed</option>
            <option value="archived" ${threadState(t) === 'archived' ? 'selected' : ''}>archived</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="changeThreadState(${t.id})">Update state</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTopic(${t.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function loadComments() {
    const data = await api.get('/admin/comments?limit=100', true);
    const list = document.getElementById('comments-list');
    if (!data.comments.length) {
      list.innerHTML = '<div class="empty">No messages found.</div>';
      return;
    }
    list.innerHTML = data.comments.map(c => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div style="font-size:0.9rem; color:var(--text-dim);">${escapeHtml(c.content).slice(0, 180)}</div>
          <div class="thread-meta">
            <span>#${c.id}</span>
            <span>by <strong>${escapeHtml(c.author_name)}</strong></span>
            <span>topic: ${escapeHtml(c.thread_title)}</span>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteMessage(${c.id})">Delete message</button>
      </div>
    `).join('');
  }

  async function loadUsers() {
    const data = await api.get('/admin/users?limit=100', true);
    const list = document.getElementById('users-list');
    if (!data.users.length) {
      list.innerHTML = '<div class="empty">No users found.</div>';
      return;
    }
    list.innerHTML = data.users.map(u => `
      <div class="thread-item" style="margin-bottom:0.6rem;">
        <div>
          <div class="thread-title">${escapeHtml(u.username)}</div>
          <div class="thread-meta">
            <span>#${u.id}</span>
            <span>${escapeHtml(u.email)}</span>
            <span>role: ${escapeHtml(u.role)}</span>
            <span>${u.is_banned ? 'banned' : 'active'}</span>
          </div>
        </div>
        ${u.role === 'admin'
          ? '<span style="font-size:0.8rem; color:var(--text-muted);">Admin account</span>'
          : `<button class="btn ${u.is_banned ? 'btn-ghost' : 'btn-danger'} btn-sm" onclick="toggleBan(${u.id}, ${u.is_banned ? 'false' : 'true'})">${u.is_banned ? 'Unban' : 'Ban'}</button>`
        }
      </div>
    `).join('');
  }

  async function changeThreadState(threadId) {
    const state = document.getElementById(`state-${threadId}`).value;
    try {
      await api.put(`/threads/${threadId}`, { state }, true);
      setAlert('Topic state updated.');
      await loadTopics();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function deleteTopic(threadId) {
    if (!confirm('Delete this topic permanently?')) return;
    try {
      await api.delete(`/threads/${threadId}`, true);
      setAlert('Topic deleted.');
      await loadTopics();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function deleteMessage(commentId) {
    if (!confirm('Delete this message?')) return;
    try {
      await api.delete(`/comments/${commentId}`, true);
      setAlert('Message deleted.');
      await loadComments();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function toggleBan(userId, ban) {
    if (!confirm(ban ? 'Ban this user?' : 'Unban this user?')) return;
    try {
      await api.patch(`/admin/users/${userId}/ban`, { ban }, true);
      setAlert(ban ? 'User banned.' : 'User unbanned.');
      await loadUsers();
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  async function init() {
    if (!ensureAdmin()) return;
    renderNav();
    try {
      await Promise.all([loadTopics(), loadComments(), loadUsers()]);
    } catch (e) {
      setAlert(e.message, true);
    }
  }

  init();
</script>
</body>
</html>
