<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Forum</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html">FORUM</a>
  <div class="nav-links">
    <a href="../index.html">← Back</a>
  </div>
</nav>

<div class="container" style="max-width:420px;">
  <div style="padding-top:3rem;">
    <div class="page-header">
      <h2>Welcome back</h2>
      <p>Log in to your account</p>
    </div>

    <div class="card">
      <div id="alert"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="login()">Login</button>
    </div>

    <p style="text-align:center; margin-top:1rem; font-size:0.875rem; color:var(--text-muted);">
      No account? <a href="register.html">Register</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  if (auth.isLoggedIn()) window.location.href = '../index.html';

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';

    if (!email || !password) {
      alertEl.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
      return;
    }
    try {
      const data = await api.post('/auth/login', { email, password });
      auth.login(data.token, data.user);
      window.location.href = '../index.html';
    } catch (e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
