<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription - Forum</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html"><img src="../img/Logo-Vareza.png" alt="Vareza Forum" /> Vareza Forum</a>
  <div class="nav-links">
    <a href="../index.html">&larr; Retour</a>
  </div>
</nav>

<div class="container" style="max-width:420px;">
  <div style="padding-top:3rem;">
    <div class="page-header">
      <h2>Creer un compte</h2>
      <p>Rejoignez la conversation des aujourd'hui</p>
    </div>

    <div class="card">
      <div id="alert"></div>
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="username" placeholder="johndoe" />
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" />
        <small style="display:block; margin-top:0.4rem; color:var(--text-muted); font-size:0.78rem;">
          Au moins 8 caracteres, une lettre majuscule et un caractere special.
        </small>
      </div>
      <div class="form-group">
        <label>Photo de profil (URL, optionnel)</label>
        <input type="url" id="avatar_url" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Biographie (optionnel)</label>
        <textarea id="bio" rows="4" maxlength="500" placeholder="Parlez un peu de vous..."></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="register()">Creer un compte</button>
    </div>

    <p style="text-align:center; margin-top:1rem; font-size:0.875rem; color:var(--text-muted);">
      Deja inscrit ? <a href="login.html">Connexion</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  async function register() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const avatar_url = document.getElementById('avatar_url').value.trim();
    const bio = document.getElementById('bio').value.trim();
    const userRegex = /^[A-Za-z0-9]+$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const hasMinLen = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasSpecial = /[^A-Za-z0-9]/.test(password);
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';

    if (!username || !email || !password) {
      alertEl.innerHTML = '<div class="alert alert-error">Veuillez remplir tous les champs obligatoires.</div>';
      return;
    }
    if (!userRegex.test(username)) {
      alertEl.innerHTML = '<div class="alert alert-error">Le nom d\'utilisateur doit contenir uniquement des lettres et des chiffres.</div>';
      return;
    }
    if (!emailRegex.test(email)) {
      alertEl.innerHTML = '<div class="alert alert-error">Veuillez saisir une adresse e-mail valide.</div>';
      return;
    }
    if (!hasMinLen || !hasUpper || !hasSpecial) {
      alertEl.innerHTML = '<div class="alert alert-error">Le mot de passe doit contenir au moins 8 caracteres, une majuscule et un caractere special.</div>';
      return;
    }
    if (bio.length > 500) {
      alertEl.innerHTML = '<div class="alert alert-error">La biographie doit faire 500 caracteres maximum.</div>';
      return;
    }

    try {
      const data = await api.post('/auth/register', { username, email, password, avatar_url, bio });
      auth.login(data.token, data.user);
      window.location.href = '../index.html';
    } catch (e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }
</script>
</body>
</html>
