<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sujet - Forum</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html"><img src="../img/Logo-Vareza.png" alt="Vareza Forum" /> Vareza Forum</a>
  <div class="nav-links" id="nav-links">
    <a href="../index.html">&larr; Sujets</a>
    <span id="nav-auth"></span>
  </div>
</nav>

<div class="container">
  <div id="thread-content"><div class="loading">Chargement du sujet...</div></div>
  <div id="comments-section" style="display:none;">
    <hr />
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
      <h3 style="font-family:var(--font-display); font-size:1.3rem;">Réponses</h3>
      <div style="display:flex; gap:0.5rem; align-items:center;">
        <select id="comment-sort" onchange="changeCommentSort(this.value)" style="width:auto; min-width:170px;">
          <option value="newest">Les plus récentes</option>
          <option value="chronological">Chronologique</option>
          <option value="likes">Les plus aimées</option>
          <option value="dislikes">Les moins aimées</option>
        </select>
        <select id="comment-batch-size" onchange="changeCommentBatchSize(this.value)" style="width:auto;">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="all">Tout</option>
        </select>
      </div>
    </div>
    <div id="comment-list"></div>
    <div id="comment-count-info" style="margin-top:0.6rem; font-size:0.82rem; color:var(--text-muted);"></div>
    <hr />
    <div id="reply-form"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const DEFAULT_AVATAR = 'https://cdn-icons-png.flaticon.com/512/11789/11789135.png';
  const slug = new URLSearchParams(location.search).get('slug');
  let threadId = null;
  let currentThread = null;
  let isEditingThread = false;
  let editingCommentId = null;
  let commentSort = 'newest';
  let commentBatchSize = '10';
  let editCategories = [];
  let editTags = [];
  const editedLabel = (createdAt, updatedAt) =>
    new Date(updatedAt).getTime() > new Date(createdAt).getTime() ? ' (modifié)' : '';

  function renderNav() {
    const user = auth.getUser();
    const navAuth = document.getElementById('nav-auth');
    if (user) {
      navAuth.innerHTML = `${user.role === 'admin' ? '<a href="admin-dashboard.html">Tableau admin</a>' : ''} <span id="account-menu-slot"></span>`;
      auth.renderAccountMenu('account-menu-slot', { basePath: '../' });
    } else {
      auth.renderAccountMenu('nav-auth', { basePath: '../' });
    }
  }

  function canManageThread(thread, user) {
    return !!user && (user.id === thread.author_id || ['admin', 'moderator'].includes(user.role));
  }

  function canReplyOnLocked(thread, user) {
    if (!thread.is_locked) return true;
    return !!user && (user.id === thread.author_id || user.role === 'admin');
  }

  async function loadThread() {
    if (!slug) {
      document.getElementById('thread-content').innerHTML = '<div class="alert alert-error">Sujet introuvable.</div>';
      return;
    }

    try {
      const data = await api.get(`/threads/${slug}`, auth.isLoggedIn());
      const t = data.thread;
      const user = auth.getUser();
      threadId = t.id;
      currentThread = t;
      document.title = `${t.title} - Forum`;
      const showInlineEdit = isEditingThread && canManageThread(t, user);

      document.getElementById('thread-content').innerHTML = `
        <div style="margin-bottom:2rem;">
          <div class="thread-flags" style="margin-bottom:0.5rem;">
            ${t.is_pinned ? '<span class="flag flag-pinned">Épinglé</span>' : ''}
            ${t.is_locked ? '<span class="flag flag-locked">Verrouillé</span>' : ''}
            ${t.state === 'archived' ? '<span class="flag flag-locked">Archivé</span>' : ''}
          </div>
          ${showInlineEdit
            ? `<input id="edit-title" type="text" value="${escapeHtml(t.title)}" style="width:100%; font-family:var(--font-display); font-size:clamp(1.5rem,4vw,2.5rem); line-height:1.2; letter-spacing:-0.02em; margin-bottom:0.75rem;" />`
            : `<h1 style="font-family:var(--font-display); font-size:clamp(1.5rem,4vw,2.5rem); line-height:1.2; letter-spacing:-0.02em; margin-bottom:0.75rem;">${t.title}</h1>`
          }
          <div style="display:flex; gap:1.25rem; align-items:center; flex-wrap:wrap; margin-bottom:1.5rem;">
            <div class="thread-meta">
              <span style="display:inline-flex; align-items:center; gap:0.35rem;">
                <img src="${t.author_avatar_url || DEFAULT_AVATAR}" onerror="this.onerror=null;this.src='${DEFAULT_AVATAR}'" alt="Avatar de ${t.author_name}" style="width:24px; height:24px; border-radius:999px; object-fit:cover; border:1px solid var(--line);" />
                <span>par <strong>${t.author_name}</strong> <span style="display:inline-block; margin-left:0.35rem; padding:0.08rem 0.42rem; border-radius:999px; font-size:0.68rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#101014; background:var(--accent);">OP</span></span>
              </span>
              <span class="category-pill">${t.category_name}</span>
              <span>${new Date(t.created_at).toLocaleDateString()}${editedLabel(t.created_at, t.updated_at)}</span>
              <span>${t.view_count} vues</span>
            </div>
          </div>
          ${showInlineEdit
            ? `
              <textarea id="edit-content" style="width:100%; min-height:220px; font-size:0.95rem; line-height:1.8; color:var(--text-dim); white-space:pre-wrap; margin-bottom:1rem;">${escapeHtml(t.content)}</textarea>
              <div style="margin-bottom:1rem;">
                <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem;">URL image / GIF</label>
                <input id="edit-image-url" type="url" value="${escapeHtml(t.image_url || '')}" placeholder="https://example.com/image.gif" />
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1rem;">
                <div>
                  <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem;">Catégorie</label>
                  <select id="edit-category">${renderCategoryOptions(t.category_id)}</select>
                </div>
                <div>
                  <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem;">État</label>
                  <select id="edit-state">
                    <option value="open" ${t.state === 'open' ? 'selected' : ''}>Ouvert</option>
                    <option value="closed" ${t.state === 'closed' ? 'selected' : ''}>Fermé</option>
                    <option value="archived" ${t.state === 'archived' ? 'selected' : ''}>Archivé</option>
                  </select>
                </div>
              </div>
              <div style="margin-bottom:1.5rem;">
                <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem;">Tags</label>
                <select id="edit-tags" multiple style="min-height:110px;">${renderTagOptions(t.tags || [])}</select>
              </div>
            `
            : `
              <div style="font-size:0.95rem; line-height:1.8; color:var(--text-dim); white-space:pre-wrap; margin-bottom:1rem;">${t.content}</div>
              ${t.image_url ? `<div style="margin-bottom:1.5rem;"><img src="${escapeHtml(t.image_url)}" alt="Image du sujet" style="max-width:100%; border-radius:12px; border:1px solid var(--line);" /></div>` : ''}
            `
          }
          <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:space-between;">
            <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
              <div class="vote-bar">
                <button class="vote-btn" onclick="vote('thread', ${t.id}, 1)" id="up-thread">▲</button>
                <span class="vote-score" id="score-thread">${t.vote_score}</span>
                <button class="vote-btn" onclick="vote('thread', ${t.id}, -1)" id="down-thread">▼</button>
              </div>
              <div>${t.tags?.map(tg => `<span class="tag">${tg.name}</span>`).join(' ') || ''}</div>
            </div>
            ${canManageThread(t, user) ? `
              <div style="display:flex; gap:0.5rem;">
                ${showInlineEdit
                  ? '<button class="btn btn-ghost btn-sm" onclick="cancelEditThread()">Annuler</button><button class="btn btn-primary btn-sm" onclick="saveThreadEdit()">Enregistrer</button>'
                  : '<button class="btn btn-ghost btn-sm" onclick="startEditThread()">Modifier le sujet</button>'
                }
                <button class="btn btn-danger btn-sm" onclick="deleteThread()">Supprimer le sujet</button>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      document.getElementById('comments-section').style.display = 'block';
      const sortSelect = document.getElementById('comment-sort');
      if (sortSelect) sortSelect.value = commentSort;
      const batchSelect = document.getElementById('comment-batch-size');
      if (batchSelect) batchSelect.value = commentBatchSize;
      renderReplyForm();
      loadComments();
    } catch (e) {
      document.getElementById('thread-content').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  async function loadComments() {
    try {
      const data = await api.get(`/threads/${threadId}/comments?sort=${encodeURIComponent(commentSort)}`, auth.isLoggedIn());
      const el = document.getElementById('comment-list');
      const limitedComments = commentBatchSize === 'all'
        ? data.comments
        : data.comments.slice(0, Number(commentBatchSize));
      const infoEl = document.getElementById('comment-count-info');
      if (infoEl) infoEl.textContent = `${limitedComments.length} message(s) affiché(s) sur ${data.comments.length}`;
      if (!limitedComments.length) {
        el.innerHTML = '<div class="empty" style="padding:1.5rem 0;">Aucune réponse pour le moment. Soyez le premier !</div>';
        return;
      }
      el.innerHTML = limitedComments.map(c => renderComment(c)).join('');
    } catch (e) {
      document.getElementById('comment-list').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  function changeCommentSort(value) {
    commentSort = value;
    loadComments();
  }

  function changeCommentBatchSize(value) {
    commentBatchSize = value;
    loadComments();
  }

  function renderComment(c, depth = 0) {
    const user = auth.getUser();
    return `
      <div class="comment" style="${depth > 0 ? 'padding-left:0;' : ''}">
        <div class="comment-header">
          <span class="comment-author">
            <span style="display:inline-flex; align-items:center; gap:0.35rem;">
              <img src="${c.author_avatar_url || DEFAULT_AVATAR}" onerror="this.onerror=null;this.src='${DEFAULT_AVATAR}'" alt="Avatar de ${c.author_name}" style="width:24px; height:24px; border-radius:999px; object-fit:cover; border:1px solid var(--line);" />
              <span>
                ${c.author_name}
                ${currentThread && Number(c.author_id) === Number(currentThread.author_id)
                  ? '<span style="display:inline-block; margin-left:0.35rem; padding:0.08rem 0.42rem; border-radius:999px; font-size:0.68rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#101014; background:var(--accent);">OP</span>'
                  : ''}
              </span>
            </span>
          </span>
          <span class="comment-time">${new Date(c.created_at).toLocaleString()}${editedLabel(c.created_at, c.updated_at)}</span>
        </div>
        <div class="comment-content">
          ${editingCommentId === c.id
            ? `
              <textarea id="edit-comment-${c.id}" style="width:100%; min-height:110px; margin-bottom:0.5rem;">${escapeHtml(c.content)}</textarea>
              <input id="edit-comment-image-${c.id}" type="url" value="${escapeHtml(c.image_url || '')}" placeholder="https://example.com/image.gif" />
            `
            : `
              <div>${c.content}</div>
              ${c.image_url ? `<div style="margin-top:0.6rem;"><img src="${escapeHtml(c.image_url)}" alt="Image du commentaire" style="max-width:100%; border-radius:10px; border:1px solid var(--line);" /></div>` : ''}
            `
          }
        </div>
        <div class="comment-actions">
          <div class="vote-bar">
            <button class="vote-btn btn-sm" onclick="vote('comment', ${c.id}, 1)">▲</button>
            <span class="vote-score" id="score-comment-${c.id}">${c.vote_score}</span>
            <button class="vote-btn btn-sm" onclick="vote('comment', ${c.id}, -1)">▼</button>
          </div>
          ${auth.isLoggedIn() ? `<button class="comment-reply-btn" onclick="setReply(${c.id})">Répondre</button>` : ''}
          ${user && user.id === c.author_id && editingCommentId !== c.id
            ? `<button class="comment-reply-btn" onclick="startEditComment(${c.id})">Modifier</button>` : ''}
          ${user && user.id === c.author_id && editingCommentId === c.id
            ? `<button class="comment-reply-btn" onclick="saveCommentEdit(${c.id})">Enregistrer</button> <button class="comment-reply-btn" onclick="cancelEditComment()">Annuler</button>` : ''}
          ${user && (user.id === c.author_id || canManageThread(currentThread, user))
            ? `<button class="comment-reply-btn" style="color:var(--accent2)" onclick="deleteComment(${c.id})">Supprimer</button>` : ''}
        </div>
        ${c.replies?.length ? `<div class="replies">${c.replies.map(r => renderComment(r, depth + 1)).join('')}</div>` : ''}
      </div>
    `;
  }

  function renderReplyForm(parentId = null) {
    const el = document.getElementById('reply-form');
    const user = auth.getUser();

    if (!auth.isLoggedIn()) {
      el.innerHTML = `<p style="color:var(--text-muted); font-size:0.875rem;"><a href="login.html">Connexion</a> pour répondre.</p>`;
      return;
    }

    if (currentThread && !canReplyOnLocked(currentThread, user)) {
      el.innerHTML = `<p style="color:var(--text-muted); font-size:0.875rem;">Ce sujet est verrouillé. Seul l'auteur ou un admin peut répondre.</p>`;
      return;
    }

    el.innerHTML = `
      <div class="card" style="margin-top:1rem;">
        ${parentId ? `<div style="font-size:0.8rem; color:var(--accent); margin-bottom:0.75rem;">Réponse au commentaire <button onclick="setReply(null)" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.8rem;">annuler</button></div>` : '<div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.75rem;">Laisser une réponse</div>'}
        <div class="form-group">
          <textarea id="reply-content" placeholder="Écrivez votre réponse..."></textarea>
        </div>
        <div class="form-group">
          <input id="reply-image-url" type="url" placeholder="URL image / GIF (optionnel)" />
        </div>
        <button class="btn btn-primary btn-sm" onclick="submitReply(${parentId})">Publier la réponse</button>
      </div>
    `;
  }

  function setReply(parentId) {
    renderReplyForm(parentId);
    document.getElementById('reply-content')?.focus();
  }

  async function submitReply(parentId) {
    const content = document.getElementById('reply-content').value.trim();
    const image_url = document.getElementById('reply-image-url').value.trim();
    if (!content) return;
    try {
      await api.post(`/threads/${threadId}/comments`, { content, image_url, parent_id: parentId || null }, true);
      renderReplyForm(null);
      loadComments();
    } catch (e) {
      alert(e.message);
    }
  }

  function startEditComment(id) {
    editingCommentId = id;
    loadComments();
  }

  function cancelEditComment() {
    editingCommentId = null;
    loadComments();
  }

  async function saveCommentEdit(id) {
    const content = document.getElementById(`edit-comment-${id}`)?.value.trim();
    const image_url = document.getElementById(`edit-comment-image-${id}`)?.value.trim();
    if (!content) {
      alert('Le commentaire ne peut pas être vide.');
      return;
    }
    try {
      await api.put(`/comments/${id}`, { content, image_url }, true);
      editingCommentId = null;
      loadComments();
    } catch (e) {
      alert(e.message);
    }
  }

  async function deleteComment(id) {
    if (!confirm('Supprimer ce commentaire ?')) return;
    try {
      await api.delete(`/comments/${id}`, true);
      loadComments();
    } catch (e) {
      alert(e.message);
    }
  }

  async function deleteThread() {
    if (!currentThread) return;
    if (!confirm('Supprimer ce sujet ?')) return;
    try {
      await api.delete(`/threads/${currentThread.id}`, true);
      window.location.href = '../index.html';
    } catch (e) {
      alert(e.message);
    }
  }

  function startEditThread() {
    ensureEditOptions().then(() => {
      isEditingThread = true;
      loadThread();
    }).catch((e) => alert(e.message));
  }

  function cancelEditThread() {
    isEditingThread = false;
    loadThread();
  }

  async function saveThreadEdit() {
    if (!currentThread) return;
    const title = document.getElementById('edit-title')?.value.trim();
    const content = document.getElementById('edit-content')?.value.trim();
    const image_url = document.getElementById('edit-image-url')?.value.trim();
    const category_id = Number(document.getElementById('edit-category')?.value);
    const state = document.getElementById('edit-state')?.value;
    const tags = Array.from(document.getElementById('edit-tags')?.selectedOptions || []).map(o => Number(o.value));
    if (!title) {
      alert('Le titre ne peut pas être vide.');
      return;
    }
    if (!content && !image_url) {
      alert('Ajoutez un texte ou une URL d\'image.');
      return;
    }
    if (!category_id) {
      alert('La catégorie est obligatoire.');
      return;
    }
    try {
      await api.put(
        `/threads/${currentThread.id}`,
        { title, content, image_url, category_id, state, tags },
        true
      );
      isEditingThread = false;
      await loadThread();
    } catch (e) {
      alert(e.message);
    }
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  async function ensureEditOptions() {
    if (editCategories.length && editTags.length) return;
    const [cats, tags] = await Promise.all([api.get('/categories'), api.get('/tags')]);
    editCategories = cats.categories || [];
    editTags = tags.tags || [];
  }

  function renderCategoryOptions(currentCategoryId) {
    return editCategories
      .map(c => `<option value="${c.id}" ${Number(currentCategoryId) === Number(c.id) ? 'selected' : ''}>${escapeHtml(c.name)}</option>`)
      .join('');
  }

  function renderTagOptions(currentTags) {
    const selected = new Set((currentTags || []).map(t => Number(t.id)));
    return editTags
      .map(t => `<option value="${t.id}" ${selected.has(Number(t.id)) ? 'selected' : ''}>${escapeHtml(t.name)}</option>`)
      .join('');
  }

  async function vote(type, id, value) {
    if (!auth.isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
    try {
      const result = await api.post('/vote', { target_type: type, target_id: id, value }, true);
      const delta = Number(result.delta || 0);
      if (type === 'thread') {
        const el = document.getElementById('score-thread');
        el.textContent = parseInt(el.textContent, 10) + delta;
      } else {
        await loadComments();
      }
    } catch (e) {
      alert(e.message);
    }
  }

  renderNav();
  loadThread();
</script>
</body>
</html>
